<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
  
<h1 id="pageTitle"></h1>
<p id="pageSubtitle">Chapitres - Adhigāram - அதிகாரம்</p>           <!-- <title>Chapitres - Adhigāram - அதிகாரம்</title> -->
  
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="cadre-presentation taped">
    <h1>Chapitres - Adhigāram - அதிகாரம்</h1>
  </div>
  <a href="javascript:history.back()" class="back-btn">← Retour</a>
</header>

<main class="divisions-container" id="container"></main>

<script src="data.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const iyalId = params.get("iyal");
const title = params.get("title");

if (title) {
    document.getElementById("pageTitle").textContent = decodeURIComponent(title);
}

const container = document.getElementById("container");





  
// const iyalId = new URLSearchParams(window.location.search).get("iyal");
// const container = document.getElementById("container");

let chapters = [];

Object.values(thirukuralData).forEach(section => {
  section.iyals.forEach(i => {
    if (i.id == iyalId) {
      chapters = i.chapters;
    }
  });
});

chapters.forEach(c => {
  const a = document.createElement("a");
  a.className = "polaroid taped";
  
a.href = `kurals.html?chapter=${c.id}&title=${encodeURIComponent(c.name)}`;   // a.href = `kurals.html?chapter=${c.id}`;

  a.innerHTML = `
    <div class="polaroid-caption">
      <h3>${c.name}</h3>
    </div>
  `;

  container.appendChild(a);
});
</script>

  
  <footer class="footer">
    Made with <span class="heart">❤️</span> by Sandrine Devaradja
</footer>
</body>
  
</html>
