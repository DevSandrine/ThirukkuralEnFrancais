<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chapitres</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="cadre-presentation taped">
    <h1>Chapitres</h1>
  </div>
</header>

<main class="divisions-container" id="container"></main>

<script src="data.js"></script>

<script>
const iyalId = new URLSearchParams(window.location.search).get("iyal");
const container = document.getElementById("container");

let chapters = [];

Object.values(thirukuralData).forEach(section => {
  section.iyals.forEach(i => {
    if (i.id == iyalId) {
      chapters = i.chapters;
    }
  });
});

chapters.forEach(c => {
  const a = document.createElement("a");
  a.className = "polaroid taped";
  a.href = `kurals.html?chapter=${c.id}`;

  a.innerHTML = `
    <div class="polaroid-caption">
      <h3>${c.name}</h3>
    </div>
  `;

  container.appendChild(a);
});
</script>

</body>
</html>
