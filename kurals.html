<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title> Distique - Kural - குறள்</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="cadre-presentation taped">
    <h1> Distique - Kural - குறள்</h1>
  </div>
  <a href="javascript:history.back()" class="back-btn">← Retour</a>
</header>

<main id="container"></main>


<div id="container"></div>

<div class="pagination">
  <button id="prev">←</button>
  <span id="page"></span>
  <button id="next">→</button>
</div>

  
<script src="data.js"></script>

<script>
const chapterId = new URLSearchParams(window.location.search).get("chapter");
const container = document.getElementById("container");

let kurals = [];

Object.values(thirukuralData).forEach(section => {
  section.iyals.forEach(i => {
    i.chapters.forEach(c => {
      if (c.id == chapterId) {
        kurals = c.kurals;
      }
    });
  });
});

kurals.forEach((k, index) => {
  const div = document.createElement("div");
  div.className = "kural";

  div.innerHTML = `
    <div class="kural-number">Kural ${index + 1}</div>
    <p>${k.tamil}</p>
    <p>${k.translation}</p>
  `;

  container.appendChild(div);
});
</script>


  <!-- Pagination JS script -->
<script>
const chapterId = new URLSearchParams(window.location.search).get("chapter");

let kurals = [];

Object.values(thirukuralData).forEach(section => {
  section.iyals.forEach(i => {
    i.chapters.forEach(c => {
      if (c.id == chapterId) {
        kurals = c.kurals;
      }
    });
  });
});

const container = document.getElementById("container");
const pageText = document.getElementById("page");

let currentPage = 1;
const perPage = 5;

function render() {
  container.innerHTML = "";

  let start = (currentPage - 1) * perPage;
  let end = start + perPage;

  let pageItems = kurals.slice(start, end);

  pageItems.forEach((k, index) => {
    const div = document.createElement("div");
    div.className = "kural";

    div.innerHTML = `
      <div class="kural-number">Kural ${start + index + 1}</div>
      <p>${k.tamil}</p>
      <p>${k.translation}</p>
    `;

    container.appendChild(div);
  });

  pageText.innerText = `Page ${currentPage}`;
}

document.getElementById("prev").onclick = () => {
  if (currentPage > 1) {
    currentPage--;
    render();
  }
};

document.getElementById("next").onclick = () => {
  if (currentPage < Math.ceil(kurals.length / perPage)) {
    currentPage++;
    render();
  }
};

render();
</script>
</body>
</html>
