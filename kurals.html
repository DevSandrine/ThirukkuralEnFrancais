<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<title>Distique - Kural - குறள்</title> 

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="cadre-presentation taped">
        <h1>Distique - Kural - குறள்</h1>
    </div>

    <a href="javascript:history.back()" class="back-btn">
        ← Retour
    </a>

</header>

<main id="container"></main>

<div class="pagination">
    <button id="prev">←</button>
    <span id="page"></span>
    <button id="next">→</button>
</div>

<script src="data.js"></script>

<script>

const chapterId = new URLSearchParams(window.location.search).get("chapter");

 let kurals = [];

Object.values(thirukuralData).forEach(section => {

    section.iyals.forEach(iyal => {

        iyal.chapters.forEach(chapter => {

            if (chapter.id == chapterId) {
                kurals = chapter.kurals;
            }

        });

    });

});

const container = document.getElementById("container");
const pageText = document.getElementById("page");

let currentPage = 1;
const perPage = 5;

function render() {

    container.innerHTML = "";

    const start = (currentPage - 1) * perPage;
    const end = start + perPage;

    const pageItems = kurals.slice(start, end);

    pageItems.forEach((kural, index) => {

        const div = document.createElement("div");

        div.className = "kural";

        div.innerHTML = `
            <div class="kural-number">
                Kural ${kural.id}
            </div>

            <p><strong>Tamoul :</strong><br>
            ${kural.tamil || ""}</p>

            <p><strong>Translittération :</strong><br>
            ${kural.tamilfr || ""}</p>

            <p><strong>Traduction :</strong><br>
            ${kural.translation || ""}</p>

            <p><strong>Commentaire :</strong><br>
            ${kural.comment || ""}</p>
        `;

        container.appendChild(div);

    });

    const totalPages = Math.max(1, Math.ceil(kurals.length / perPage));

    pageText.textContent =
        `Page ${currentPage} / ${totalPages}`;

}

document.getElementById("prev").addEventListener("click", () => {

    if (currentPage > 1) {
        currentPage--;
        render();
        window.scrollTo(0, 0);
    }

});

document.getElementById("next").addEventListener("click", () => {

    const totalPages =
        Math.ceil(kurals.length / perPage);

    if (currentPage < totalPages) {
        currentPage++;
        render();
        window.scrollTo(0, 0);
    }

});

render();

</script>

<footer class="footer">
    Made with <span class="heart">❤️</span> by Sandrine Devaradja
</footer>
    
</body>

    
</html>
