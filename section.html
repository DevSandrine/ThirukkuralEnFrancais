<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sections - Iyal -இயல்</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="cadre-presentation taped">
    <h1>Sections - Iyal -இயல்</h1>
  </div>
  <a href="javascript:history.back()" class="back-btn">← Retour</a>
</header>

<main class="divisions-container" id="container"></main>

<script src="data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const section = params.get("section");

const container = document.getElementById("container");

const iyals = thirukuralData[section].iyals;

iyals.forEach(i => {
  const a = document.createElement("a");
  a.className = "polaroid taped";
  a.href = `chapter.html?iyal=${i.id}`;

  a.innerHTML = `
    <div class="polaroid-caption">
      <h3>${i.name}</h3>
    </div>
  `;

  container.appendChild(a);
});
</script>

</body>
</html>
