<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapitres</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<a class="back" href="index.html">← Retour</a>

<h1 id="title"></h1>

<div id="chapters"></div>

<script src="data.js"></script>

<script>
const sectionId = new URLSearchParams(location.search).get("section");
const section = thirukuralData.sections[sectionId];

document.getElementById("title").innerText = section.name;

const container = document.getElementById("chapters");

section.chapters.forEach(chap => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h2>${chap.name}</h2>
        <a class="btn" href="chapter.html?section=${sectionId}&chapter=${chap.id}">
            Lire →
        </a>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
