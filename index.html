<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thirukkural</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="cadre-presentation taped">
            <h1>Thirukkural (திருக்குறள்)</h1>
            <p>
                Découvrez les 1330 maximes de la littérature tamoule,
                divisées en trois grandes sections éthiques et philosophiques.
            </p>
        </div>
    </header>

    <main class="divisions-container">

        <a href="chapitres.html?section=1" class="polaroid taped">
            <div class="polaroid-image">
                <img src="images/A.jpeg" alt="Aram - Vertu">
            </div>
            <div class="polaroid-caption">
                <h3>Aram (அறம்)</h3>
                <p>La Vertu / Virtue</p>
            </div>
        </a>

        <a href="chapitres.html?section=2" class="polaroid taped">
            <div class="polaroid-image">
                <img src="images/B.jpeg" alt="Porul - Richesse">
            </div>
            <div class="polaroid-caption">
                <h3>Porul (பொருள்)</h3>
                <p>La Richesse / Wealth</p>
            </div>
        </a>

        <a href="chapitres.html?section=3" class="polaroid taped">
            <div class="polaroid-image">
                <img src="images/C.jpeg" alt="Inbam - Amour">
            </div>
            <div class="polaroid-caption">
                <h3>Inbam (இன்பம்)</h3>
                <p>L'Amour / Love</p>
            </div>
        </a>

    </main>

</body>
</html>
