<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thirukkural</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="cadre-presentation taped">
        <h1>Thirukkural (திருக்குறள்)</h1>
        <p>
            Découvrez les 1330 maximes de la littérature tamoule,
            divisées en trois grandes sections éthiques et philosophiques.
        </p>
    </div>
</header>

<main class="divisions-container">

    <!-- ARAM -->
    <a href="section.html?section=1" class="polaroid taped">
        <div class="polaroid-image">
            <img src="images/aram.jpg" alt="Aram">
        </div>
        <div class="polaroid-caption">
            <h3>Aram (அறம்)</h3>
            <p>La Vertu / Virtue</p>
        </div>
    </a>

    <!-- PORUL -->
    <a href="section.html?section=2" class="polaroid taped">
        <div class="polaroid-image">
            <img src="images/porul.jpg" alt="Porul">
        </div>
        <div class="polaroid-caption">
            <h3>Porul (பொருள்)</h3>
            <p>La Richesse / Wealth</p>
        </div>
    </a>

    <!-- INBAM -->
    <a href="section.html?section=3" class="polaroid taped">
        <div class="polaroid-image">
            <img src="images/inbam.jpg" alt="Inbam">
        </div>
        <div class="polaroid-caption">
            <h3>Inbam (இன்பம்)</h3>
            <p>L'Amour / Love</p>
        </div>
    </a>

</main>

</body>
</html>
